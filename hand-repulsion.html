<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand Repulsion</title>
    <link rel="stylesheet" href="/src/fonts.css" />
    <link rel="stylesheet" href="/src/nav.css" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        background: #000;
        color: #fff;
        font-family: "PPNeueMontreal", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
      }

      main {
        width: 100%;
        max-width: 680px;
      }

      /* ─── text container ─────────────────────────────────────── */
      #text-container {
        position: relative;
        cursor: none;
      }

      #text-container span {
        position: absolute;
        top: 0;
        left: 0;
        font-family: "PPNeueMontreal", sans-serif;
        font-size: 18px;
        line-height: 1;
        color: rgba(255, 255, 255, 0.92);
        white-space: pre;
        will-change: transform;
        user-select: none;
        pointer-events: none;
      }

      #text-container.loading {
        visibility: hidden;
      }

      /* ─── debug landmark overlay (position: fixed = viewport-absolute) ──── */
      .debug-dot {
        position: fixed;
        top: 0;
        left: 0;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        pointer-events: none;
        will-change: transform;
        z-index: 500;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .debug-dot.visible { opacity: 1; }

      #debug-index { background: #f472b6; }
      #debug-thumb { background: #f472b6; }

      #debug-line {
        position: fixed;
        top: 0;
        left: 0;
        height: 1.5px;
        background: #f472b6;
        transform-origin: 0 50%;
        pointer-events: none;
        will-change: transform, width;
        z-index: 500;
        opacity: 0;
        transition: opacity 0.15s;
      }
      #debug-line.visible { opacity: 0.85; }

      /* ─── status badge ────────────────────────────────────────── */
      #hand-status {
        position: fixed;
        bottom: 24px;
        right: 24px;
        font-family: "PPNeueMontreal", sans-serif;
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <a href="/" class="nav-link">Cursor Repulsion</a>
      <a href="/hand-repulsion.html" class="nav-link active">Hand Repulsion</a>
    </nav>

    <main>
      <div id="text-container" class="loading"></div>
    </main>

    <!-- Debug overlay: position:fixed, viewport-absolute. Shown only with MediaPipe. -->
    <!-- Line is first in DOM → renders below the dots -->
    <div id="debug-line"></div>                      <!-- green line index→thumb         -->
    <div class="debug-dot" id="debug-index"></div>  <!-- pink  — INDEX_FINGER_TIP lm 8 -->
    <div class="debug-dot" id="debug-thumb"></div>  <!-- yellow — THUMB_TIP lm 4       -->

    <span id="hand-status">Initializing…</span>

    <script type="module" src="/src/hand-repulsion.ts"></script>
  </body>
</html>
